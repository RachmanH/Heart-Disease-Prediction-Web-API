<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Prediksi Penyakit Jantung</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>Prediksi Penyakit Jantung</h1>
      <p class="subtitle">
        Aplikasi ini memprediksi risiko penyakit jantung berdasarkan data kesehatan Anda.
      </p>

      <form id="predictionForm">
        <div class="form-grid">
          <div class="form-group">
            <label>Age (Usia)</label>
            <input type="number" id="age" min="20" max="100" required>
          </div>

          <div class="form-group">
            <label>Sex (Jenis Kelamin: 1=Laki-laki, 0=Perempuan)</label>
            <input type="number" id="sex" min="0" max="1" required>
          </div>

          <div class="form-group">
            <label>CP (Tipe Nyeri Dada: 0-3)</label>
            <input type="number" id="cp" min="0" max="3" required>
          </div>

          <div class="form-group">
            <label>Trestbps (Tekanan Darah Istirahat)</label>
            <input type="number" id="trestbps" min="80" max="250" required>
          </div>

          <div class="form-group">
            <label>Chol (Kolesterol)</label>
            <input type="number" id="chol" min="100" max="600" required>
          </div>

          <div class="form-group">
            <label>FBS (Gula Darah Puasa: 1=&gt;120, 0=Normal)</label>
            <input type="number" id="fbs" min="0" max="1" required>
          </div>

          <div class="form-group">
            <label>Restecg (Hasil EKG Istirahat: 0-2)</label>
            <input type="number" id="restecg" min="0" max="2" required>
          </div>

          <div class="form-group">
            <label>Thalach (Detak Jantung Maksimum)</label>
            <input type="number" id="thalach" min="60" max="250" required>
          </div>

          <div class="form-group">
            <label>Exang (Angina Saat Olahraga: 1=Ya, 0=Tidak)</label>
            <input type="number" id="exang" min="0" max="1" required>
          </div>

          <div class="form-group">
            <label>Oldpeak (ST Depresi)</label>
            <input type="number" step="0.1" id="oldpeak" min="0" max="10" required>
          </div>

          <div class="form-group">
            <label>Slope (Kemiringan ST: 0-2)</label>
            <input type="number" id="slope" min="0" max="2" required>
          </div>

          <div class="form-group">
            <label>CA (Pembuluh Darah Tersumbat: 0-4)</label>
            <input type="number" id="ca" min="0" max="4" required>
          </div>

          <div class="form-group">
            <label>Thal (Tes Thalassemia: 0-3)</label>
            <input type="number" id="thal" min="0" max="3" required>
          </div>
        </div>

        <button type="submit">Prediksi Sekarang</button>
      </form>

      <div id="resultBox" class="result hidden">
        <h2>Hasil Prediksi</h2>
        <p id="resultText"></p>
        <p id="probabilityText"></p>
        <p id="riskLevelText"></p>
      </div>

      <p class="note">
        Catatan: Aplikasi ini hanya digunakan untuk pembelajaran dan tidak menggantikan diagnosis medis.
      </p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
